name: Mirror Compatibility Check

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/opencode-compat.yml'
      - 'commands/**'
      - 'skills/**'
      - 'skills-codex/**'
      - 'codex/.codex/skills/**'
      - 'opencode/skills/**'
      - 'opencode/README.md'
      - 'docs/architecture/hokage-core.md'
      - 'docs/bootstrap-routing-contract.md'
      - 'docs/skill-orchestration-design-contract.md'
      - 'docs/tool-capability-matrix.md'
      - 'scripts/build-opencode.js'
      - 'scripts/generate-skill-manifest.sh'
      - 'scripts/opencode-setup-local.sh'
      - 'scripts/setup-opencode.sh'
      - 'scripts/sync-skill-mirrors.sh'
      - 'scripts/validate-opencode.js'
      - 'tests/test-bootstrap-routing-contract.sh'
      - 'tests/test-opencode-setup.sh'
      - 'tests/test-skill-design-contract.sh'
      - 'tests/test-tool-capability-matrix.sh'
  pull_request:
    paths:
      - '.github/workflows/opencode-compat.yml'
      - 'commands/**'
      - 'skills/**'
      - 'skills-codex/**'
      - 'codex/.codex/skills/**'
      - 'opencode/skills/**'
      - 'opencode/README.md'
      - 'docs/architecture/hokage-core.md'
      - 'docs/bootstrap-routing-contract.md'
      - 'docs/skill-orchestration-design-contract.md'
      - 'docs/tool-capability-matrix.md'
      - 'scripts/build-opencode.js'
      - 'scripts/generate-skill-manifest.sh'
      - 'scripts/opencode-setup-local.sh'
      - 'scripts/setup-opencode.sh'
      - 'scripts/sync-skill-mirrors.sh'
      - 'scripts/validate-opencode.js'
      - 'tests/test-bootstrap-routing-contract.sh'
      - 'tests/test-opencode-setup.sh'
      - 'tests/test-skill-design-contract.sh'
      - 'tests/test-tool-capability-matrix.sh'

permissions:
  contents: read

concurrency:
  group: opencode-compat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
          filter: blob:none

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Build opencode version
        run: node scripts/build-opencode.js

      - name: Validate opencode format
        run: node scripts/validate-opencode.js

      - name: Validate OpenCode setup contract
        run: bash tests/test-opencode-setup.sh

      - name: Validate Hokage Core contracts
        run: |
          bash tests/test-tool-capability-matrix.sh
          bash tests/test-bootstrap-routing-contract.sh
          bash tests/test-skill-design-contract.sh

      - name: Check opencode mirror sync
        run: |
          if ! git diff --quiet opencode/; then
            echo "::error::opencode/ is out of sync with skills/templates"
            echo "Run 'node scripts/build-opencode.js' and commit the changes."
            git diff --stat opencode/
            exit 1
          fi
          echo "✅ opencode/ is in sync"

      - name: Check codex mirror sync
        run: |
          bash scripts/ci/check-consistency.sh
